sonar.projectKey=mateusz-klatt_hestia
sonar.organization=mateusz-klatt

# Analysed sources = the hestia package (tools/ is standalone, outside the coverage gate)
sonar.sources=hestia
sonar.tests=tests
sonar.exclusions=tools/**,docs/**

# Coverage produced by `coverage xml` in CI (stdlib unittest; .coveragerc source=hestia, branch=True)
sonar.python.version=3.14
sonar.python.coverage.reportPaths=coverage.xml

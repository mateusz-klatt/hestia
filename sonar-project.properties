sonar.projectKey=mateusz-klatt_hestia
sonar.organization=mateusz-klatt

# Analysed sources = the hestia package (tools/ is standalone, outside the coverage gate)
sonar.sources=hestia
sonar.tests=tests
sonar.exclusions=tools/**,docs/**

# Coverage produced by `coverage xml` in CI (stdlib unittest; .coveragerc source=hestia, branch=True)
sonar.python.version=3.14
sonar.python.coverage.reportPaths=coverage.xml

# api_contract.py models omittable-but-non-null wire fields with a `default=None` SENTINEL that the
# `_OMIT` post-processor strips from the schema. The field type is intentionally NON-Optional: when
# present it is never null (the contract deliberately rejects present-null — see the read-shape tests).
# So S5890 ("add Optional, or drop the None default") is a false positive for this whole file.
sonar.issue.ignore.multicriteria=e1
sonar.issue.ignore.multicriteria.e1.ruleKey=python:S5890
sonar.issue.ignore.multicriteria.e1.resourceKey=hestia/api_contract.py

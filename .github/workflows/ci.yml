name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ui:
    name: ui · typecheck · lint · test · build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test

      - name: Build
        run: npm run build

  test:
    name: tests · 100% coverage · SonarCloud
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0          # SonarCloud needs full history for new-code / blame

      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      # Runtime deps (cryptography) + the `coverage` dev tool.
      - name: Install dependencies
        run: |
          python -m pip install --upgrade coverage
          python -m pip install -r requirements.txt

      - name: Unit tests + 100% line+branch gate + coverage.xml
        run: |
          python -m coverage run -m unittest discover -s tests
          python -m coverage report --fail-under=100
          python -m coverage xml

      # Reads sonar-project.properties; uploads coverage.xml. SONAR_TOKEN is a repo secret.
      # Requires the SonarCloud project's Analysis Method = "CI-based" (Automatic Analysis OFF).
      - name: SonarCloud scan
        uses: SonarSource/sonarqube-scan-action@v8
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io

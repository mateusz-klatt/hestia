<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>hestia — devices</title>
  </head>
  <body>
    <div id="login" hidden></div>
    <div id="app">
    <h1 id="hdr">
      <span id="hdr-text">hestia — devices</span><span id="conn"></span><span id="auth"></span
      ><button id="refresh" type="button">Refresh</button>
    </h1>
    <div id="globals">
      🍼 crib: <span id="g-crib">—</span> &nbsp;·&nbsp; 🌡 outdoor: <span id="g-outdoor">—</span> / <span id="g-outdoor-humidity">—</span>
    </div>
    <div id="mode"></div>
    <div id="ir-buttons" class="panel"></div>
    <div id="klima" class="panel"></div>
    <table>
      <thead>
        <tr>
          <th>node</th>
          <th>last seen</th>
          <th>battery</th>
          <th>inferred type</th>
          <th>stan</th>
          <th>akcje</th>
          <th>name</th>
          <th>room</th>
        </tr>
      </thead>
      <tbody id="rows"></tbody>
    </table>
    <p id="status" hidden></p>

    <h2 id="auto-hdr">automations</h2>
    <table>
      <thead>
        <tr>
          <th>id</th>
          <th>on</th>
          <th>trigger</th>
          <th>cond</th>
          <th>actions</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="auto-rows"></tbody>
    </table>
    <div id="auto-editor">
      <div id="rule-form" class="panel"></div>
      <textarea
        id="rule-json"
        rows="11"
        spellcheck="false"
        aria-label="rule JSON"
        placeholder="rule JSON — click &quot;New rule template&quot; for a skeleton"
      ></textarea>
      <div>
        <button id="rule-template" type="button">New rule template</button>
        <button id="save-rule" type="button">Save rule</button>
        <span id="rule-status" class="status"></span>
      </div>
    </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>

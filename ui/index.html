<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>hestia — devices</title>
  </head>
  <body>
    <div id="login" hidden></div>
    <div id="app">
    <h1 id="hdr">
      <span id="logo" aria-hidden="true"><svg width="22" height="22" viewBox="0 0 24 24"><path fill="currentColor" d="M13.5.67s.74 2.65.74 4.8c0 2.06-1.35 3.73-3.41 3.73-2.07 0-3.63-1.67-3.63-3.73l.03-.36C5.21 7.51 4 10.62 4 14c0 4.42 3.58 8 8 8s8-3.58 8-8C20 8.61 17.41 3.8 13.5.67zM11.71 19c-1.78 0-3.22-1.4-3.22-3.14 0-1.62 1.05-2.76 2.81-3.12 1.77-.36 3.6-1.21 4.62-2.58.39 1.29.59 2.65.59 4.04 0 2.65-2.15 4.8-4.8 4.8z"/></svg></span><span id="hdr-text">hestia — devices</span><span id="conn"></span><span id="auth"></span>
    </h1>
    <div id="view-switch" class="view-switch"></div>
    <!-- Shared, so a failed /api/discovery is visible in BOTH views (not buried in the admin view). -->
    <p id="status" hidden></p>
    <!-- Shared: indoor (crib) + outdoor temperature, so the live temps show on the main rooms
         screen (LiveController writes these spans by id, wherever they sit). -->
    <!-- Icon-only: 🍼 crib temp (left) · 🌡 outdoor temp / humidity (right). LiveController writes the spans. -->
    <div id="globals">
      <span class="g-item">🍼 <span id="g-crib">—</span></span>
      <span class="g-item">🌡 <span id="g-outdoor">—</span> / <span id="g-outdoor-humidity">—</span></span>
    </div>

    <!-- Wife-friendly room view (default). House-wide IR/klima panels live here in their own
         persistent containers; #room-list is the only part rooms.ts rebuilds. -->
    <section id="rooms-view">
      <div id="rooms-ir" class="panel"></div>
      <div id="rooms-klima" class="panel"></div>
      <div id="room-list"></div>
    </section>

    <!-- Full engineer view: the device table, globals, mode line, automations editor. -->
    <section id="admin-view" hidden>
    <div id="admin-tools"><button id="refresh" type="button">Refresh</button></div>
    <div id="mode"></div>
    <div id="ir-buttons" class="panel"></div>
    <div id="klima" class="panel"></div>
    <table>
      <thead>
        <tr>
          <th>node</th>
          <th>last seen</th>
          <th>battery</th>
          <th>inferred type</th>
          <th>stan</th>
          <th>akcje</th>
          <th>name</th>
          <th>room</th>
        </tr>
      </thead>
      <tbody id="rows"></tbody>
    </table>

    <h2 id="auto-hdr">automations</h2>
    <table>
      <thead>
        <tr>
          <th>id</th>
          <th>on</th>
          <th>trigger</th>
          <th>cond</th>
          <th>actions</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="auto-rows"></tbody>
    </table>
    <div id="auto-editor">
      <div id="rule-form" class="panel"></div>
      <textarea
        id="rule-json"
        rows="11"
        spellcheck="false"
        aria-label="rule JSON"
        placeholder="rule JSON — click &quot;New rule template&quot; for a skeleton"
      ></textarea>
      <div>
        <button id="rule-template" type="button">New rule template</button>
        <button id="save-rule" type="button">Save rule</button>
        <span id="rule-status" class="status"></span>
      </div>
    </div>
    </section>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
